apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  USER_SERVICE_URL: "http://user-service:8081"
  PRODUCT_SERVICE_URL: "http://product-service:8082"
  ORDER_SERVICE_URL: "http://order-service:8083"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8084"
  JWT_EXPIRES_IN: "24h"
  CURRENCY: "USD"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: ecommerce
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USER: "postgres"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "admin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stripe-config
  namespace: ecommerce
data:
  STRIPE_PUBLISHABLE_KEY: "pk_test_your_publishable_key"
  CURRENCY: "USD"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smtp-config
  namespace: ecommerce
data:
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  FROM_EMAIL: "noreply@ecommerce.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: twilio-config
  namespace: ecommerce
data:
  TWILIO_PHONE_NUMBER: "+1234567890"
