apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: ecommerce
data:
  PORT: "3001"
  DB_HOST: "user-db"
  DB_PORT: "5432"
  DB_NAME: "userdb"
  JWT_SECRET: "your-jwt-secret-key"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  namespace: ecommerce
data:
  PORT: "3002"
  DB_HOST: "product-db"
  DB_PORT: "5432"
  DB_NAME: "productdb"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  PORT: "3003"
  DB_HOST: "order-db"
  DB_PORT: "5432"
  DB_NAME: "orderdb"
  RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: ecommerce
data:
  PORT: "3004"
  RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: ecommerce
data:
  PORT: "3000"
  USER_SERVICE_URL: "http://user-service:3001"
  PRODUCT_SERVICE_URL: "http://product-service:3002"
  ORDER_SERVICE_URL: "http://order-service:3003"
  NODE_ENV: "production"
