apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ecommerce-template
  annotations:
    openshift.io/display-name: "E-commerce Microservices Platform"
    description: "Complete e-commerce platform with microservices architecture using Kubernetes, Istio, and OpenShift"
    tags: "microservices,ecommerce,nodejs,postgresql,redis"
parameters:
- name: NAMESPACE
  displayName: Namespace
  description: The OpenShift project name
  value: ecommerce
  required: true
- name: APP_NAME
  displayName: Application Name
  description: The name of the application
  value: ecommerce
  required: true
- name: IMAGE_TAG
  displayName: Image Tag
  description: The tag for container images
  value: latest
  required: true
- name: DB_PASSWORD
  displayName: Database Password
  description: Password for PostgreSQL databases
  generate: expression
  from: "[a-zA-Z0-9]{16}"
  required: true
- name: JWT_SECRET
  displayName: JWT Secret
  description: Secret key for JWT token generation
  generate: expression
  from: "[a-zA-Z0-9]{32}"
  required: true
objects:
# Service Account
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: ${APP_NAME}-sa
    namespace: ${NAMESPACE}
# User Service Deployment
- apiVersion: apps.openshift.io/v1
  kind: DeploymentConfig
  metadata:
    name: user-service
    namespace: ${NAMESPACE}
    labels:
      app: user-service
  spec:
    replicas: 2
    selector:
      app: user-service
    triggers:
    - type: ConfigChange
    template:
      metadata:
        labels:
          app: user-service
      spec:
        serviceAccountName: ${APP_NAME}-sa
        containers:
        - name: user-service
          image: ecommerce/user-service:${IMAGE_TAG}
          ports:
          - containerPort: 8081
          env:
          - name: PORT
            value: "8081"
          - name: DB_NAME
            value: "userdb"
          - name: DB_PASSWORD
            value: ${DB_PASSWORD}
          - name: JWT_SECRET
            value: ${JWT_SECRET}
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            timeoutSeconds: 3
# User Service
- apiVersion: v1
  kind: Service
  metadata:
    name: user-service
    namespace: ${NAMESPACE}
    labels:
      app: user-service
  spec:
    selector:
      app: user-service
    ports:
    - port: 8081
      targetPort: 8081
# User Service Route
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: user-service
    namespace: ${NAMESPACE}
  spec:
    to:
      kind: Service
      name: user-service
    port:
      targetPort: 8081
# API Gateway Deployment
- apiVersion: apps.openshift.io/v1
  kind: DeploymentConfig
  metadata:
    name: api-gateway
    namespace: ${NAMESPACE}
    labels:
      app: api-gateway
  spec:
    replicas: 2
    selector:
      app: api-gateway
    triggers:
    - type: ConfigChange
    template:
      metadata:
        labels:
          app: api-gateway
      spec:
        serviceAccountName: ${APP_NAME}-sa
        containers:
        - name: api-gateway
          image: ecommerce/api-gateway:${IMAGE_TAG}
          ports:
          - containerPort: 8080
          env:
          - name: PORT
            value: "8080"
          - name: JWT_SECRET
            value: ${JWT_SECRET}
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
# API Gateway Service
- apiVersion: v1
  kind: Service
  metadata:
    name: api-gateway
    namespace: ${NAMESPACE}
    labels:
      app: api-gateway
  spec:
    selector:
      app: api-gateway
    ports:
    - port: 8080
      targetPort: 8080
# API Gateway Route (Edge Termination)
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: api-gateway
    namespace: ${NAMESPACE}
  spec:
    to:
      kind: Service
      name: api-gateway
    port:
      targetPort: 8080
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
